aid: amazon-transfer-family
name: Amazon Transfer Family
description: >-
  AWS Transfer Family is a secure transfer service that enables you to transfer
  files into and out of AWS storage services. It supports SFTP, FTPS, and FTP
  protocols, providing a fully managed file transfer service with native
  integration to Amazon S3 and Amazon EFS.
