apis:
  - aid: amazon-transfer-family:amazon-transfer-family-api
    name: AWS Transfer Family API
    description: >-
      The AWS Transfer Family API provides programmatic access to create and
      manage SFTP, FTPS, and FTP file transfer servers. It enables managing
      users, SSH public keys, roles, and server configurations for secure
      file transfer workflows integrated with Amazon S3 and EFS.
